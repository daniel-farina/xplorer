<!DOCTYPE html>
<html lang="en" class="grok-build">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grok Search — XBrowser</title>
  <link rel="stylesheet" href="/theme.css">
  <link rel="stylesheet" href="/toolbar.css">
  <link rel="stylesheet" href="/search.css">
</head>
<body>
  <header class="grok-toolbar">
    <a class="grok-logo" href="/search">✦ Grok</a>
    <div class="grok-toolbar-spacer"></div>
    <div class="grok-toolbar-actions">
      <div class="grok-nav-pills" id="home-toggle" title="Grok navigation">
        <div class="grok-pill-wrap">
          <a class="grok-pill" href="https://x.com/i/chat" target="_blank" rel="noopener noreferrer">X Chat</a>
          <div class="grok-pill-menu">
            <a href="https://x.com/i/chat" target="_blank" rel="noopener noreferrer">Open X Chat</a>
          </div>
        </div>
        <div class="grok-pill-wrap">
          <button type="button" class="grok-pill active" data-home="build">Grok Build</button>
          <div class="grok-pill-menu">
            <a href="/">Conversations</a>
            <a href="/apps">Apps</a>
          </div>
        </div>
        <div class="grok-pill-wrap">
          <button type="button" class="grok-pill" data-home="web">Grok Web</button>
          <div class="grok-pill-menu">
            <a href="https://grok.com/imagine" target="_blank" rel="noopener noreferrer">Imagine</a>
          </div>
        </div>
        <div class="grok-pill-wrap">
          <button type="button" class="grok-pill" data-home="wiki">Wiki</button>
          <div class="grok-pill-menu">
            <a href="https://grokipedia.com/" target="_blank" rel="noopener noreferrer">Grokipedia</a>
          </div>
        </div>
        <div class="grok-pill-wrap">
          <a class="grok-pill" href="https://x.com/" target="_blank" rel="noopener noreferrer">x.com</a>
          <div class="grok-pill-menu">
            <a href="https://x.com/" target="_blank" rel="noopener noreferrer">Home</a>
          </div>
        </div>
      </div>
    </div>
  </header>
  <main class="main">
    <form id="search-form" class="search-box">
      <span class="spark">✦</span>
      <select id="model-select" class="search-model-select" title="Model" aria-label="Model"></select>
      <input id="q" type="search" placeholder="Search with Grok…" autocomplete="off" autofocus>
      <div id="image-tools" class="image-tools hidden">
        <input id="image-file" type="file" accept="image/*" class="hidden" aria-hidden="true">
        <button type="button" id="upload-image" class="img-btn" title="Upload image">Upload</button>
        <button type="button" id="screenshot-page" class="img-btn" title="Screenshot active tab">Screenshot</button>
      </div>
      <button type="submit">Search</button>
    </form>
    <div id="image-preview" class="image-preview hidden">
      <img id="preview-img" alt="Search image">
      <button type="button" id="clear-image" class="clear-image" title="Remove image">×</button>
    </div>
    <section id="results" class="results hidden"></section>
    <section id="hero" class="hero">
      <h1>Search the web with Grok</h1>
      <p>Web results, images, videos, and AI image generation — powered by your native AI companion.</p>
    </section>
  </main>
  <script src="/common.js"></script>
  <script src="/search.js"></script>
</body>
</html>
