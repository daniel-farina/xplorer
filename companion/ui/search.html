<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grok Search — XBrowser</title>
  <link rel="stylesheet" href="/theme.css">
  <link rel="stylesheet" href="/search.css">
</head>
<body>
  <header class="header">
    <a class="logo" href="/search">✦ Grok</a>
    <nav class="modes" id="modes">
      <button class="mode active" data-mode="web">All</button>
      <button class="mode" data-mode="images">Images</button>
      <button class="mode" data-mode="videos">Videos</button>
      <button class="mode" data-mode="imagine">Imagine</button>
    </nav>
    <div class="header-actions">
      <span class="model-badge" id="model-badge" title="Active model">…</span>
      <select id="model-select" class="model-select" title="Default model"></select>
      <button class="sidebar-btn" id="open-sidebar" title="Open Grok chat">Chat</button>
    </div>
  </header>
  <main class="main">
    <form id="search-form" class="search-box">
      <span class="spark">✦</span>
      <input id="q" type="search" placeholder="Search with Grok…" autocomplete="off" autofocus>
      <div id="image-tools" class="image-tools hidden">
        <input id="image-file" type="file" accept="image/*" class="hidden" aria-hidden="true">
        <button type="button" id="upload-image" class="img-btn" title="Upload image">Upload</button>
        <button type="button" id="screenshot-page" class="img-btn" title="Screenshot active tab">Screenshot</button>
      </div>
      <button type="submit">Search</button>
    </form>
    <div id="image-preview" class="image-preview hidden">
      <img id="preview-img" alt="Search image">
      <button type="button" id="clear-image" class="clear-image" title="Remove image">×</button>
    </div>
    <section id="results" class="results hidden"></section>
    <section id="hero" class="hero">
      <h1>Search the web with Grok</h1>
      <p>Web results, images, videos, and AI image generation — powered by your native AI companion.</p>
    </section>
  </main>
  <script src="/common.js"></script>
  <script src="/search.js"></script>
</body>
</html>
