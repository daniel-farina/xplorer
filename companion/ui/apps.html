<!DOCTYPE html>
<html lang="en" class="grok-build">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grok Apps — Xplorer</title>
  <link rel="stylesheet" href="/theme.css">
  <script>document.documentElement.setAttribute('data-theme',matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');</script>
  <link rel="stylesheet" href="/toolbar.css">
  <link rel="stylesheet" href="/apps.css">
</head>
<body class="apps-page">
  <header class="grok-toolbar">
    <a class="grok-logo" href="/search">✦ Grok</a>
    <div class="grok-toolbar-spacer"></div>
    <div class="grok-toolbar-actions">
      <div class="grok-nav-pills" id="home-toggle" title="Grok navigation">
        <div class="grok-pill-wrap">
          <a class="grok-pill" href="https://x.com/i/chat" target="_blank" rel="noopener noreferrer">X Chat</a>
          <div class="grok-pill-menu">
            <a href="https://x.com/i/chat" target="_blank" rel="noopener noreferrer">Open X Chat</a>
          </div>
        </div>
        <div class="grok-pill-wrap">
          <button type="button" class="grok-pill active" data-home="build">Grok Build</button>
          <div class="grok-pill-menu">
            <a href="/" data-route="conversations">Conversations</a>
            <a href="/apps" data-route="apps">Apps</a>
          </div>
        </div>
        <div class="grok-pill-wrap">
          <button type="button" class="grok-pill" data-home="web">Grok Web</button>
          <div class="grok-pill-menu">
            <a href="/search" data-route="search">Search</a>
            <a href="https://grok.com/imagine" target="_blank" rel="noopener noreferrer">Imagine</a>
          </div>
        </div>
        <div class="grok-pill-wrap">
          <button type="button" class="grok-pill" data-home="wiki">Wiki</button>
          <div class="grok-pill-menu">
            <a href="https://grokipedia.com/" target="_blank" rel="noopener noreferrer">Grokipedia</a>
          </div>
        </div>
        <div class="grok-pill-wrap">
          <a class="grok-pill" href="https://x.com/" target="_blank" rel="noopener noreferrer">x.com</a>
          <div class="grok-pill-menu">
            <a href="https://x.com/" target="_blank" rel="noopener noreferrer">Home</a>
          </div>
        </div>
      </div>
    </div>
  </header>
  <main class="apps-main">
    <section class="apps-hero">
      <h1>Apps</h1>
      <p>Build, import, and manage apps with Grok Build agents. Each app lives in its own folder with a dedicated conversation.</p>
    </section>
    <section class="apps-create">
      <textarea id="create-prompt" placeholder="Describe an app to build or changes to make…"></textarea>
      <div class="apps-create-row">
        <input id="create-name" type="text" placeholder="App name (optional)">
        <button type="button" class="apps-btn primary" id="create-btn">Create app</button>
      </div>
    </section>
    <section class="apps-import">
      <input id="import-path" type="text" placeholder="Import existing app folder path…">
      <input id="import-name" type="text" placeholder="Display name (optional)">
      <button type="button" class="apps-btn" id="import-btn">Import</button>
    </section>
    <div id="apps-bulk-bar" class="apps-bulk-bar hidden">
      <label class="apps-bulk-select-all">
        <input type="checkbox" id="apps-select-all">
        <span>Select all</span>
      </label>
      <button type="button" class="apps-btn" id="export-selected-btn" disabled>Export selected</button>
      <button type="button" class="apps-btn" id="restart-selected-btn" disabled>Restart selected</button>
      <button type="button" class="apps-btn danger" id="delete-selected-btn" disabled>Delete selected</button>
    </div>
    <section id="apps-grid" class="apps-grid"></section>
    <p id="apps-empty" class="apps-empty hidden">No apps yet. Create one above.</p>
  </main>
  <script src="/common.js"></script>
  <script src="/apps.js"></script>
</body>
</html>
