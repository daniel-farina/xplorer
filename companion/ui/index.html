<!DOCTYPE html>
<html lang="en" class="grok-build">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grok — Xplorer</title>
  <link rel="stylesheet" href="/theme.css">
  <script>document.documentElement.setAttribute('data-theme',matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');</script>
  <link rel="stylesheet" href="/toolbar.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="grok-toolbar-mount"></div>

  <main class="chat">
    <header class="chat-bar">
      <button type="button" id="conv-toggle" class="iconbtn" title="Conversations" aria-label="Show conversations" aria-expanded="false">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M3 6h18v2H3zM3 11h18v2H3zM3 16h18v2H3z"/></svg>
      </button>
      <div class="chat-bar-title" id="chat-title">Grok</div>
      <button type="button" id="active-count" class="active-count" hidden title="Chats running — open list"></button>
      <button type="button" id="chat-info-btn" class="iconbtn" title="Chat info" aria-label="Chat info" aria-expanded="false">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.48.48 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87a.49.49 0 00.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6a3.6 3.6 0 110-7.2 3.6 3.6 0 010 7.2z"/></svg>
      </button>
      <button type="button" id="new-chat-top" class="iconbtn" title="New conversation" aria-label="New conversation">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6z"/></svg>
      </button>
    </header>

    <div id="chat-info" class="chat-info" hidden></div>

    <div id="messages" class="messages"></div>

    <div id="msg-queue" class="msg-queue" hidden></div>

    <form id="composer" class="composer">
      <div class="composer-row">
        <textarea id="input" rows="1" placeholder="Ask Grok to browse, organize tabs…"></textarea>
        <button type="button" id="stop" class="composer-stop" hidden title="Stop generating" aria-label="Stop">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>
        </button>
        <button type="submit" id="send" class="composer-send" title="Send" aria-label="Send">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M4 12l16-8-6 16-2.5-6.2L4 12z"/></svg>
        </button>
      </div>
      <div class="composer-tools">
        <select id="model-select" class="composer-model-select" title="Model" aria-label="Model"></select>
        <button type="button" id="effort-gear" class="composer-gear" title="Response settings" aria-label="Response settings">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.48.48 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87a.49.49 0 00.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.04.24.23.41.47.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 00-.12-.61l-2.01-1.58zM12 15.6a3.6 3.6 0 110-7.2 3.6 3.6 0 010 7.2z"/></svg>
        </button>
      </div>
      <div id="effort-popover" class="effort-popover" hidden>
        <div class="effort-title">Response settings</div>
        <label class="effort-row"><span>Effort</span>
          <select id="effort-select">
            <option value="low">Low — fastest</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
            <option value="xhigh">Extra high</option>
            <option value="max">Max</option>
          </select>
        </label>
        <label class="effort-row"><span>Max turns</span>
          <input id="maxturns-input" type="number" min="1" max="200" step="1" />
        </label>
        <div class="effort-hint">Lower effort + fewer turns = faster replies.</div>
      </div>
    </form>
  </main>

  <div class="drawer-backdrop" id="drawer-backdrop" hidden></div>
  <aside class="sidebar" id="conv-drawer" aria-hidden="true">
    <div class="sidebar-head">
      <div class="sidebar-label">Conversations</div>
      <button type="button" id="new-chat" class="sidebar-new" title="New conversation">+ New</button>
    </div>
    <input type="search" id="conv-filter" class="conv-filter" placeholder="Filter chats…" autocomplete="off" title="Press / to focus">
    <ul id="conv-list"></ul>
  </aside>

  <script src="/toolbar.js"></script>
  <script src="/common.js"></script>
  <script src="/app.js"></script>
  <script>
    // Conversations drawer: hidden by default, toggled by the header button.
    (function () {
      var body = document.body;
      var toggle = document.getElementById('conv-toggle');
      var backdrop = document.getElementById('drawer-backdrop');
      var drawer = document.getElementById('conv-drawer');
      var newTop = document.getElementById('new-chat-top');
      var newChat = document.getElementById('new-chat');
      var list = document.getElementById('conv-list');
      function open() {
        body.classList.add('conv-open');
        backdrop.hidden = false;
        toggle.setAttribute('aria-expanded', 'true');
        drawer.setAttribute('aria-hidden', 'false');
      }
      function close() {
        body.classList.remove('conv-open');
        backdrop.hidden = true;
        toggle.setAttribute('aria-expanded', 'false');
        drawer.setAttribute('aria-hidden', 'true');
      }
      toggle && toggle.addEventListener('click', function () {
        body.classList.contains('conv-open') ? close() : open();
      });
      backdrop && backdrop.addEventListener('click', close);
      // Active-chat count badge opens the conversations list to manage running chats.
      var activeCount = document.getElementById('active-count');
      activeCount && activeCount.addEventListener('click', open);
      // Header "+" starts a new chat (reusing the drawer's handler) and closes the drawer.
      newTop && newChat && newTop.addEventListener('click', function () { newChat.click(); close(); });
      // Picking a conversation closes the drawer so the chat gets the full width.
      list && list.addEventListener('click', close);
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });
    })();
  </script>
</body>
</html>
