<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grok — XBrowser</title>
  <link rel="stylesheet" href="/theme.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="top">
    <div class="brand">
      <span class="logo">✦</span>
      <span class="name">Grok</span>
      <span class="badge" id="status">connecting…</span>
      <label class="model-wrap">
        <select id="model-select" class="model-select" title="Model"></select>
      </label>
      <span id="model-badge" class="model-badge"></span>
      <div class="home-toggle" id="home-toggle" title="Default Grok home page">
        <button type="button" class="home-opt active" data-home="build">Grok Build</button>
        <button type="button" class="home-opt" data-home="web">Grok Web</button>
      </div>
    </div>
    <button id="new-chat" title="New conversation">+</button>
  </header>
  <aside class="sidebar">
    <div class="sidebar-label">Conversations</div>
    <ul id="conv-list"></ul>
  </aside>
  <main class="chat">
    <div id="messages" class="messages"></div>
    <form id="composer" class="composer">
      <textarea id="input" rows="1" placeholder="Ask Grok to browse, organize tabs, manage bookmarks…"></textarea>
      <button type="submit" id="send">Send</button>
    </form>
  </main>
  <script src="/common.js"></script>
  <script src="/app.js"></script>
</body>
</html>
