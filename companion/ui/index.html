<!DOCTYPE html>
<html lang="en" class="grok-build">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grok — XBrowser</title>
  <link rel="stylesheet" href="/theme.css">
  <link rel="stylesheet" href="/toolbar.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="grok-toolbar">
    <a class="grok-logo" href="/search">✦ Grok</a>
    <nav class="grok-modes">
      <a class="grok-mode" href="/search?mode=web">All</a>
      <a class="grok-mode" href="/search?mode=images">Images</a>
      <a class="grok-mode" href="/search?mode=videos">Videos</a>
      <a class="grok-mode" href="/search?mode=imagine">Imagine</a>
    </nav>
    <div class="grok-toolbar-spacer"></div>
    <div class="grok-toolbar-actions">
      <span class="grok-model-badge" id="status">connecting…</span>
      <div class="grok-toggle" id="home-toggle" title="Grok home">
        <button type="button" class="grok-toggle-opt active" data-home="build">Grok Build</button>
        <button type="button" class="grok-toggle-opt" data-home="web">Grok Web</button>
      </div>
      <span id="model-badge" class="grok-model-badge"></span>
      <select id="model-select" class="grok-model-select" title="Model"></select>
      <button type="button" class="grok-toolbar-btn" id="new-chat" title="New conversation">+ Chat</button>
    </div>
  </header>
  <aside class="sidebar">
    <div class="sidebar-label">Conversations</div>
    <ul id="conv-list"></ul>
  </aside>
  <main class="chat">
    <div id="messages" class="messages"></div>
    <form id="composer" class="composer">
      <textarea id="input" rows="1" placeholder="Ask Grok to browse, organize tabs, manage bookmarks…"></textarea>
      <button type="submit" id="send">Send</button>
    </form>
  </main>
  <script src="/common.js"></script>
  <script src="/app.js"></script>
</body>
</html>
