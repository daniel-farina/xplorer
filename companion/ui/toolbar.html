<!-- Canonical Xplorer toolbar markup — SINGLE SOURCE for every surface.
     Consumed live (fetched) by:
       - companion pages  → common.js mountGrokToolbar() injects this
       - native overlay   → grok_web_bar.cc fetches GW + '/toolbar.html'
     Root-relative hrefs (/switch-home, /apps, …) work as-is on the companion
     origin; the native overlay rewrites a[href^="/"] to absolute gateway URLs.
     IMPORTANT: write internal hrefs as double-quoted, root-relative, no space —
     exactly href="/path" — so the C++ rewrite in grok_web_bar.cc matches them.
     Pills carry BOTH data-home (companion home-switch) and data-pill (native
     active-state + handoff) so the same DOM drives both wirings. -->
