<!DOCTYPE html>
<html lang="en" class="grok-build">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>App — Grok Build</title>
  <link rel="stylesheet" href="/theme.css">
  <script>document.documentElement.setAttribute('data-theme',matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');</script>
  <link rel="stylesheet" href="/toolbar.css">
  <link rel="stylesheet" href="/apps.css">
  <link rel="stylesheet" href="/app.css">
</head>
<body class="app-view-page">
  <header class="grok-toolbar">
    <a class="grok-logo" href="/apps">✦ Grok</a>
    <div class="grok-toolbar-spacer"></div>
    <div class="grok-toolbar-actions">
      <div class="grok-nav-pills" id="home-toggle" title="Grok navigation">
        <div class="grok-pill-wrap">
          <a class="grok-pill" href="https://x.com/i/chat" target="_blank" rel="noopener noreferrer">X Chat</a>
          <div class="grok-pill-menu">
            <a href="https://x.com/i/chat" target="_blank" rel="noopener noreferrer">Open X Chat</a>
          </div>
        </div>
        <div class="grok-pill-wrap">
          <button type="button" class="grok-pill active" data-home="build">Grok Build</button>
          <div class="grok-pill-menu">
            <a href="/">Conversations</a>
            <a href="/apps">Apps</a>
          </div>
        </div>
        <div class="grok-pill-wrap">
          <button type="button" class="grok-pill" data-home="web">Grok Web</button>
          <div class="grok-pill-menu">
            <a href="https://grok.com/imagine" target="_blank" rel="noopener noreferrer">Imagine</a>
          </div>
        </div>
        <div class="grok-pill-wrap">
          <button type="button" class="grok-pill" data-home="wiki">Wiki</button>
          <div class="grok-pill-menu">
            <a href="https://grokipedia.com/" target="_blank" rel="noopener noreferrer">Grokipedia</a>
          </div>
        </div>
        <div class="grok-pill-wrap">
          <a class="grok-pill" href="https://x.com/" target="_blank" rel="noopener noreferrer">x.com</a>
          <div class="grok-pill-menu">
            <a href="https://x.com/" target="_blank" rel="noopener noreferrer">Home</a>
          </div>
        </div>
      </div>
    </div>
  </header>
  <div class="app-subtoolbar">
    <img id="app-icon" class="app-icon" width="28" height="28" alt="">
    <span class="app-title" id="app-title">App</span>
    <span class="app-path" id="app-path" title=""></span>
    <span class="app-status idle" id="app-status">Idle</span>
    <span class="spacer"></span>
    <a class="apps-btn" id="open-app-tab" href="#" target="_blank" rel="noopener noreferrer" title="Open app on localhost">Open tab</a>
    <button type="button" class="apps-btn" id="copy-cli" title="Copy grok resume command">Copy CLI</button>
    <a class="apps-btn" id="back-gallery" href="/apps">Gallery</a>
  </div>
  <div class="app-workspace" id="app-workspace">
    <section class="app-preview" id="app-preview">
      <div class="app-preview-placeholder" id="preview-placeholder">Loading preview…</div>
    </section>
    <button type="button" class="chat-toggle" id="chat-toggle" title="Toggle chat sidebar" aria-expanded="true" aria-controls="app-chat">‹</button>
    <aside class="app-chat" id="app-chat">
      <div class="app-chat-messages" id="chat-messages"></div>
      <form class="app-chat-form" id="chat-form">
        <textarea id="chat-input" rows="2" placeholder="Ask Grok to edit this app…"></textarea>
        <button type="submit" id="chat-send">Send</button>
      </form>
    </aside>
  </div>
  <script src="/common.js"></script>
  <script src="/app-view.js"></script>
</body>
</html>
