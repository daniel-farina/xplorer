name: Release

# Build Xplorer and attach installers to a GitHub Release.
#
# IMPORTANT: Chromium does NOT build on GitHub-hosted runners — they cap at
# ~14 GB disk and a 6 h job limit, while a Chromium checkout+build needs
# ~100 GB and several hours. This workflow therefore targets a SELF-HOSTED
# macOS runner labelled `xplorer-builder` that already has depot_tools and a
# synced Chromium checkout at $XPLORER_CHROMIUM_SRC.
#
# To set one up:
#   1. On a Mac with Xcode + ~150 GB free, fetch Chromium once (see AGENTS.md).
#   2. Settings ▸ Actions ▸ Runners ▸ New self-hosted runner, add label
#      `xplorer-builder`, and export XPLORER_CHROMIUM_SRC=/path/to/chromium/src.
#
# Tagging `v*` (e.g. `git tag v0.1.0 && git push --tags`) runs it. You can also
# trigger it manually from the Actions tab.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        arch: [arm64, x64]
    runs-on: [self-hosted, macos, xplorer-builder]
    steps:
      - name: Checkout Xplorer overlay
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: echo "v=${GITHUB_REF_NAME:-${{ github.event.inputs.version }}}" >> "$GITHUB_OUTPUT"

      - name: Release pipeline (${{ matrix.arch }})
        run: ./scripts/release_arch.sh "${{ matrix.arch }}" "${{ steps.ver.outputs.v }}" "$XPLORER_CHROMIUM_SRC"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xplorer-macos-${{ matrix.arch }}
          path: |
            dist/Xplorer-macos-*.zip
            dist/Xplorer-macos-*.dmg
            dist/Xplorer-macos-*.sha256.txt
          if-no-files-found: error

  # Windows has the same constraint as macOS: GitHub-hosted runners can't build
  # Chromium (~14 GB disk / 6 h cap vs. ~150 GB / hours). This targets a
  # SELF-HOSTED Windows runner labelled `xplorer-builder-win` with depot_tools
  # and a synced checkout at $XPLORER_CHROMIUM_SRC. See RELEASE.windows.md.
  build-windows:
    runs-on: [self-hosted, windows, xplorer-builder-win]
    steps:
      - name: Checkout Xplorer overlay
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "${{ github.event.inputs.version }}" }
          "v=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Release pipeline (x64)
        shell: pwsh
        run: .\scripts\release_win.ps1 -Arch x64 -Version "${{ steps.ver.outputs.v }}" -Src $env:XPLORER_CHROMIUM_SRC

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xplorer-windows-x64
          path: |
            dist/Xplorer-windows-*.zip
            dist/Xplorer-windows-*.exe
            dist/Xplorer-windows-*.sha256.txt
          if-no-files-found: error

  publish:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all arch artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve version
        id: ver
        run: echo "v=${GITHUB_REF_NAME:-${{ github.event.inputs.version }}}" >> "$GITHUB_OUTPUT"

      - name: Collect release files
        run: |
          mkdir -p release-files
          find dist -type f \( \
            -name 'Xplorer-macos-*.zip' -o -name 'Xplorer-macos-*.dmg' -o -name 'Xplorer-macos-*.sha256.txt' \
            -o -name 'Xplorer-windows-*.zip' -o -name 'Xplorer-windows-*.exe' -o -name 'Xplorer-windows-*.sha256.txt' \
          \) -exec cp {} release-files/ \;
          ls -lh release-files/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.v }}
          name: Xplorer ${{ steps.ver.outputs.v }}
          files: release-files/*
          body: |
            Xplorer ${{ steps.ver.outputs.v }} — AI-native Chromium fork.
            **macOS** (Apple Silicon arm64 + Intel x86_64) and **Windows x64** builds included.
            - macOS: open the DMG for your Mac and drag Xplorer to Applications.
            - Windows: run `Xplorer-windows-x64-installer.exe` (installs + creates shortcuts), or unzip the portable `Xplorer-windows-x64.zip` and run `Xplorer.exe`.
              The Windows build isn't code-signed yet, so SmartScreen warns — click **More info → Run anyway** (and allow it in Defender if prompted).
            See RELEASE.md (macOS) / RELEASE.windows.md (Windows) and AGENTS.md for connecting agents.
